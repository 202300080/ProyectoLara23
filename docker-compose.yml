services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lara23_app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:80"
    environment:
      - APP_KEY=${APP_KEY}
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=lara23
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lara23_network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: lara23_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: lara23
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lara23_network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lara23_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: secret
    ports:
      - "8888:80"
    depends_on:
      - mysql
    networks:
      - lara23_network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  lara23_network:
    driver: bridge
