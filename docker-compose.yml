services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lara23_app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:80"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=lara23
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - APP_DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lara23_network
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: lara23_postgres
    environment:
      POSTGRES_DB: lara23
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lara23_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lara23_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - lara23_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  lara23_network:
    driver: bridge
