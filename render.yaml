services:
  - type: web
    name: lara23-app
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: lara23-app
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: lara23-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lara23-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: lara23-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: lara23-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lara23-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: lara23-db
    databaseName: lara23
    user: lara23_user
    plan: free
